name: Update profile stats images

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # tous les jours 03:00 UTC
  push:
    branches: [main]
    paths:
      - "README.md"
      - ".github/workflows/profile-stats.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate images (via github-readme-stats with token)
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: |
          mkdir -p assets

          curl -L \
            -H "Authorization: Bearer ${GH_STATS_TOKEN}" \
            -o assets/github-stats.svg \
            "https://github-readme-stats.vercel.app/api?username=kjd-dktech&show_icons=true&theme=github_dark&hide_border=true&include_all_commits=true&count_private=true"

          curl -L \
            -H "Authorization: Bearer ${GH_STATS_TOKEN}" \
            -o assets/top-langs.svg \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=kjd-dktech&layout=compact&theme=github_dark&hide_border=true&langs_count=8"

          # Ces 2 là sont souvent public-only selon le provider,
          # mais on tente quand même via rendu d'image statique.
          curl -L -o assets/streak.svg \
            "https://streak-stats.demolab.com/?user=kjd-dktech&theme=github-dark-blue&hide_border=true"

          curl -L -o assets/activity-graph.svg \
            "https://github-readme-activity-graph.vercel.app/graph?username=kjd-dktech&theme=github-compact&hide_border=true&area=true"

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/*.svg
          git commit -m "chore: update profile stats"
          git push
